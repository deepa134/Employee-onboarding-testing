<div style="height:100vh;display:flex;justify-content:center;align-items:center;">
  <div class="app-card">
    <h2 style="margin-bottom:5px;font-size:20px">Employee Onboarding Portal</h2>
    <p style="margin-bottom:15px;font-size:13px">Login to continue</p>

    <div style="display:flex;gap:5px;margin-bottom:15px">
      <button class="btn" [ngStyle]="{background: role==='CANDIDATE' ? '#000' : '#fff', color: role==='CANDIDATE' ? '#fff' : '#000'}" (click)="setRole('CANDIDATE')">Candidate</button>
      <button class="btn" [ngStyle]="{background: role==='HR' ? '#000' : '#fff', color: role==='HR' ? '#fff' : '#000'}" (click)="setRole('HR')">HR</button>
      <button class="btn" [ngStyle]="{background: role==='INTERVIEWER' ? '#000' : '#fff', color: role==='INTERVIEWER' ? '#fff' : '#000'}" (click)="setRole('INTERVIEWER')">Interviewer</button>
    </div>

    <div *ngIf="role==='CANDIDATE'">
      <input [(ngModel)]="email" placeholder="Enter your email" style="width:100%;padding:7px;margin-bottom:10px;border:1px solid #000" />
    </div>

    <div *ngIf="role==='INTERVIEWER'">
      <select [(ngModel)]="name" style="width:100%;padding:7px;margin-bottom:10px;border:1px solid #000">
        <option value="">Select Interviewer</option>
        <option value="Kavya">Kavya</option>
        <option value="Arun">Arun</option>
        <option value="Divya">Divya</option>
      </select>
      <input [(ngModel)]="password" type="password" placeholder="Enter password" style="width:100%;padding:7px;margin-bottom:10px;border:1px solid #000" />
    </div>

    <button class="btn" style="width:100%;padding:8px;background:#000;color:#fff;border:none;" (click)="handleLogin()">Login</button>
  </div>
</div>
