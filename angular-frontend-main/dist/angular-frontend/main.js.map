<div style="padding:40px">
  <h2>Employee Onboarding Form</h2>
  <form (ngSubmit)="handleSubmit()" style="display:flex;flex-direction:column;width:300px;gap:10px">
    <input name="address" placeholder="Address" [(ngModel)]="formData.address" required />
    <input name="aadhaar" placeholder="Aadhaar Number" [(ngModel)]="formData.aadhaar" required />
    <input name="pan" placeholder="PAN Number" [(ngModel)]="formData.pan" required />
    <input name="bankAccount" placeholder="Bank Account Number" [(ngModel)]="formData.bankAccount" required />
    <button type="submit">Submit</button>
  </form>
</div>
