<div style="text-align:center;margin-top:120px">

  <h2>Email Verification</h2>

  <p>{{message}}</p>

  <button *ngIf="verified"
          style="padding:10px 20px;
                 background:#4f46e5;
                 color:white;
                 border:none;
                 border-radius:6px;
                 cursor:pointer"
          (click)="goLogin()">

    Go to Login

  </button>

</div>
