<div style="padding:40px;max-width:400px;margin:auto">

<h2>Candidate Register</h2>

<label>Name</label>
<input [(ngModel)]="name" class="modern-input"><br><br>

<label>Email</label>
<input [(ngModel)]="email" class="modern-input"><br><br>

<label>Password</label>
<input type="password" [(ngModel)]="password" class="modern-input"><br><br>

<button class="btn-submit" (click)="register()">Register</button>

</div>
